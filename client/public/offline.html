<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mất kết nối — Capyvo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #fdfdfd;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1a1a1a;
      }

      .content {
        text-align: center;
      }

      .content img {
        width: 550px;
        height: auto;
        margin-bottom: 28px;
        user-select: none;
        pointer-events: none;
      }

      .title {
        font-size: 34px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #111;
      }

      .subtitle {
        font-size: 14px;
        color: #888;
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .btn {
        display: inline-block;
        padding: 10px 24px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
      }

      .btn:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <div>
      <img src="./offline-image.png" alt="Mất kết nối" draggable="false" />
      <p class="title">Không có kết nối mạng</p>
      <p class="subtitle">Vui lòng kiểm tra kết nối internet và thử lại.</p>
      <button class="btn" onclick="window.location.reload()">Thử lại</button>
    </div>
  </body>
</html>
